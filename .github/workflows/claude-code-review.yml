name: Claude Code Review

permissions:
  contents: read
  pull-requests: write
  id-token: write

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          prompt: |
            Review this pull request (#${{ github.event.pull_request.number }}) for Apogee,
            a self-custodial Liquid (L-BTC) wallet browser extension. Look for correctness
            bugs and — especially — security issues, given this is a wallet:
              - private key / seed / wallet descriptor handling and any leakage of them
              - the window.apogee / window.liquid provider trust boundary
              - page <-> extension message passing (postMessage, content bridge)
              - cryptographic correctness (signing, blinding, key derivation)
              - DOM-based XSS (innerHTML / dangerouslySetInnerHTML)

            ALWAYS post exactly one PR comment summarizing the review, even when the PR is
            clean. Format:
              - First line — a verdict: "✅ No issues found" OR "⚠️ Issues found".
              - If issues: list each with severity (High / Medium / Low), file:line, and a
                one-line suggested fix.
              - Keep it concise. Do not open inline review comments; post a single summary
                comment so the result is always visible.
          claude_args: "--model claude-opus-4-8 --max-turns 12"
