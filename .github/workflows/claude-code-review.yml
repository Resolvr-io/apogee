name: Claude Code Review

permissions:
  contents: read
  pull-requests: write
  id-token: write

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          prompt: |
            Review the changes in this pull request (#${{ github.event.pull_request.number }}) —
            focus on the diff; only open other files when needed to judge a change. This is
            Apogee, a self-custodial Liquid (L-BTC) wallet browser extension, so prioritize
            security: key / seed / wallet-descriptor leakage, the window.apogee / window.liquid
            provider trust boundary, page <-> extension message passing, cryptographic
            correctness, and DOM XSS. Also flag clear correctness bugs.

            When done, post exactly ONE PR comment as your review:
              - First line — a verdict: "✅ No issues found" or "⚠️ Issues found".
              - If issues: list each with severity (High / Medium / Low), file:line, and a
                one-line suggested fix.
            Post the comment whether or not you find issues. Be concise.
          claude_args: "--model claude-opus-4-8 --max-turns 30"
