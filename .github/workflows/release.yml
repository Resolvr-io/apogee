name: Release

# Pushing a v* tag builds both targets and publishes a GitHub Release with two
# zips attached: apogee-<version>-chrome.zip (Chrome Web Store, from dist/) and
# apogee-<version>-firefox.zip (AMO, from dist-firefox/). Each build already
# emits its own manifest, so no per-store manifest editing is needed. Release
# notes come from the tag's annotation (or can be edited on the Release after).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json $PKG" >&2
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Build and zip
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          pnpm build
          (cd dist && zip -rX "../apogee-${VERSION}-chrome.zip" . -x '*.DS_Store')
          pnpm build:firefox
          (cd dist-firefox && zip -rX "../apogee-${VERSION}-firefox.zip" . -x '*.DS_Store')
          echo "Chrome zip:";  unzip -l "apogee-${VERSION}-chrome.zip" | tail -3
          echo "Firefox zip:"; unzip -l "apogee-${VERSION}-firefox.zip" | tail -3

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          gh release create "${GITHUB_REF_NAME}" \
            --title "Apogee ${VERSION}" \
            --notes "See the changelog in the README for details." \
            "apogee-${VERSION}-chrome.zip" \
            "apogee-${VERSION}-firefox.zip"
