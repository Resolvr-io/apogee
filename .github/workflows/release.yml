name: Release

# Pushing a v* tag builds the extension, zips dist/ as apogee-<version>.zip,
# and publishes a GitHub Release with the zip attached. The same zip is what
# gets uploaded to the Chrome Web Store. Release notes come from the tag's
# annotation (or can be edited on the Release afterwards).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json $PKG" >&2
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Build and zip
        run: |
          pnpm build
          VERSION="$(node -p "require('./package.json').version")"
          (cd dist && zip -rX "../apogee-${VERSION}.zip" .)
          unzip -l "apogee-${VERSION}.zip" | tail -3

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          gh release create "${GITHUB_REF_NAME}" \
            --title "Apogee ${VERSION}" \
            --notes "See the changelog in the README for details." \
            "apogee-${VERSION}.zip"
